<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minesweeper</title>
    <link rel="stylesheet" type="text/css" href="css/styles.css" />
  </head>
  <body>
    <form id="form">
      <label for="rows">Number of Rows (5-25):</label>
      <input
        type="number"
        id="rows"
        name="rows"
        min="5"
        max="25"
        value="10"
        required
      />
      <br />
      <label for="cols">Number of Columns (5-25):</label>
      <input
        type="number"
        id="cols"
        name="cols"
        min="5"
        max="25"
        value="10"
        required
      />
      <br />
      <label for="mines">Number of Mines (5-25):</label>
      <input
        type="number"
        id="mines"
        name="mines"
        min="5"
        max="25"
        value="10"
        required
      />
      <br />

      <p>
        <b>Left Click:</b> Open cell <br />
        <b>Right Click:</b> Set cell to flag
      </p>
      <p id="error" role="alert"></p>

      <button type="submit" id="game">Play Game</button>
    </form>

    <script type="module" src="js/controllers/mainmenu.js"></script>
  </body>
</html>
