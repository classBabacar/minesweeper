<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minesweeper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Public+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="css/styles.css" />
  </head>
  <body>
    <main class="console">
      <p class="eyebrow">Field Briefing</p>
      <h1 class="title">Minesweeper</h1>

      <form id="form" class="panel">
        <div class="field">
          <label for="rows">Rows (5 - 25)</label>
          <input
            type="number"
            id="rows"
            name="rows"
            min="5"
            max="25"
            value="10"
            required
          />
        </div>
        <div class="field">
          <label for="cols">Columns (5 - 25)</label>
          <input
            type="number"
            id="cols"
            name="cols"
            min="5"
            max="25"
            value="10"
            required
          />
        </div>
        <div class="field">
          <label for="mines">Mines (5 - 25)</label>
          <input
            type="number"
            id="mines"
            name="mines"
            min="5"
            max="25"
            value="10"
            required
          />
        </div>

        <div class="divider"></div>

        <dl class="legend">
          <div class="legend-row">
            <dt>Left Click -</dt>
            <dd>Open cell</dd>
          </div>
          <div class="legend-row">
            <dt>Right Click -</dt>
            <dd>Flag cell</dd>
          </div>
        </dl>

        <p id="error" class="error" role="alert"></p>

        <button type="submit" id="game" class="deploy">Start</button>
      </form>
    </main>

    <script type="module" src="js/controllers/mainmenu.js"></script>
  </body>
</html>
